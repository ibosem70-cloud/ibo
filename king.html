<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الصدارة - نظام الترتيب العام</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #000; 
            margin: 0; 
            padding: 120px 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }

        .scroller { 
            width: 100%; 
            padding: 100px 0; 
            overflow-x: auto; 
            white-space: nowrap; 
            cursor: grab; 
            border-top: 3px solid #ff0050; 
            border-bottom: 3px solid #ff0050; 
            user-select: none;
        }
        .scroller:active { cursor: grabbing; }
        .scroller::-webkit-scrollbar { display: none; }
        
        .track { 
            display: inline-block; 
            padding: 0 150px; 
        }

        /* رجعتلك حركة المكافأة: وهج نيون متغير الألوان */
        @keyframes ultra-neon {
            0% { box-shadow: 0 0 20px currentcolor; filter: hue-rotate(0deg); }
            50% { box-shadow: 0 0 50px currentcolor; filter: brightness(1.5) hue-rotate(20deg); }
            100% { box-shadow: 0 0 20px currentcolor; filter: hue-rotate(0deg); }
        }

        .card { 
            display: inline-block; 
            background: rgba(10, 10, 10, 0.95); 
            width: 450px; 
            height: 65px; 
            border-radius: 12px; 
            border: 4px solid #333; 
            position: relative; 
            margin: 0 40px; /* مسافة أمان لعيونك كرمال ما يضربوا ببعض */
            animation: ultra-neon 2s infinite ease-in-out; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            vertical-align: middle;
            z-index: 1;
        }

        /* التكبير الناري اللي طلبته */
        .card:hover { 
            transform: scale(1.3); /* تكبير ملكي أوضح */
            z-index: 9999 !important; /* يطير فوق الكل */
            filter: brightness(1.7) hue-rotate(10deg);
            box-shadow: 0 0 80px currentcolor !important;
            cursor: pointer;
        }

        .medal-slot { position: absolute; top: 50%; transform: translateY(-50%); right: 15px; font-size: 32px; }
        .rank-number { position: absolute; top: 50%; transform: translateY(-50%); left: 20px; font-size: 26px; font-weight: 900; color: #ff6600; }

        .place-1 { color: #ffd700; border-color: #ffd700 !important; background: linear-gradient(90deg, rgba(255,215,0,0.1), rgba(0,0,0,0.9)) !important; }
        .place-2 { color: #ffffff; border-color: #ffffff !important; }
        .place-3 { color: #cd7f32; border-color: #cd7f32 !important; }
        .place-normal { color: #ff0050; border-color: #ff0050 !important; }

        .add-btn { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; background: #ff0050; color: #fff; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; z-index: 10000; box-shadow: 0 0 20px #ff0050; }
    </style>
</head>
<body>
    <div class="scroller" id="box"><div class="track" id="tr"></div></div>
    <button class="add-btn" onclick="add()">+</button>
    <script>
        const b = document.getElementById('box'), tr = document.getElementById('tr');
        function add() {
            const c = document.createElement('div'); 
            c.className = 'card';
            c.innerHTML = `<div class="rank-number"></div><div class="medal-slot"></div>`;
            tr.appendChild(c);
            updateStatus();
            b.scrollTo({ left: b.scrollWidth, behavior: 'smooth' });
        }
        function updateStatus() {
            const cards = Array.from(tr.getElementsByClassName('card'));
            cards.forEach((c, i) => {
                const p = i + 1;
                const r = c.querySelector('.rank-number');
                const m = c.querySelector('.medal-slot');
                r.innerText = '#' + p;
                c.classList.remove('place-1', 'place-2', 'place-3', 'place-normal');
                if(p === 1) { c.classList.add('place-1'); m.innerHTML = '👑'; }
                else if(p === 2) { c.classList.add('place-2'); m.innerHTML = '🥈'; }
                else if(p === 3) { c.classList.add('place-3'); m.innerHTML = '🥉'; }
                else { c.classList.add('place-normal'); m.innerHTML = ''; }
            });
        }
        for(let i=0; i<6; i++) add();
        let isDown = false, startX, scrollLeft;
        b.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - b.offsetLeft; scrollLeft = b.scrollLeft; b.style.cursor = 'grabbing'; });
        b.addEventListener('mouseleave', () => { isDown = false; b.style.cursor = 'grab'; });
        b.addEventListener('mouseup', () => { isDown = false; b.style.cursor = 'grab'; });
        b.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - b.offsetLeft; const walk = (x - startX) * 2; b.scrollLeft = scrollLeft - walk; });
    </script>
</body>
</html>
